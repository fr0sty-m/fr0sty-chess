name: Windows Build (MSYS2 UCRT64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-sfml
          p7zip

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        # Build klasörünü oluştur ve konfigüre et
        cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        # Derle
        cmake --build build --config Release

    - name: Prepare Release Package
      shell: msys2 {0}
      run: |
        mkdir -p dist
        
        # Binary dosyasını kopyala (src altında olduğunu varsayıyorum)
        cp build/src/*.exe dist/
        
        # Assets ve Config dosyalarını kopyala# ÖNEMLİ: Tüm DLL'leri kopyalamak yerine sadece g
        [ -d "assets" ] && cp -r assets dist/
        [ -f "config.ini" ] && cp config.ini dist/
        
        # ÖNEMLİ: Tüm DLL'leri kopyalamak yerine sadece gerekli olanları alalım
        # SFML ve UCRT bağımlılıklarını dist içine taşır
        ldd dist/*.exe | grep -iv "system32" | awk '{print $3}' | xargs -I {} cp {} dist/

    - name: Compress Release Package
      shell: msys2 {0}
      run: |
        7z a -t7z -mx9 fr0sty-chess-windows-x64.7z ./dist/*

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fr0sty-chess-windows-x64
        path: fr0sty-chess-windows-x64.7z
