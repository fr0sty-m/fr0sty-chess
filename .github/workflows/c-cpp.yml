name: Windows Build (MSYS2 UCRT64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-sfml

    - name: Build Project
      shell: msys2 {0}
      run: |
        cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Copy DLL and Delete Build Files
      shell: msys2 {0}
      run: |
        cp /ucrt64/bin/*.dll build/
        cp -r assets build/
        cp 

    - name: Prepare Release Package
      shell: msys2 {0}
      run: |
        mkdir -p dist
        cp build/*.exe dist/
        cp build/*.dll dist/
        cp -r assets dist/
        cp ./config.ini dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: fr0sty-chess-windows-x64
        path: dist/
