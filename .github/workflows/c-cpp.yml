name: Windows Build (MSYS2 UCRT64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-toolchain
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-sfml

    - name: Build Project
      shell: msys2 {0}
      run: |
        cmake -B build -S . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build

    - name: Copy DLLs
      shell: msys2 {0}
      run: |
        cp /ucrt64/bin/*.dll build/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chess-Game-Windows
        path: build/
